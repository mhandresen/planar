name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

      - run: pnpm test

      - run: pnpm lint

      - run: pnpm format:check

      - name: Verify the committed Action bundle is current
        run: |
          pnpm run bundle
          git diff --exit-code dist/ \
            || (echo "::error::dist/ is stale — run 'pnpm run bundle' and commit the result." && exit 1)
